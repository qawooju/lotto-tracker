name: Lotto Tracker

on:
  schedule:
    # 매주 토요일 오전 11:30 KST (= 2:30 UTC)
    - cron: '30 2 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tracker
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C0AK0SZ2KK5
        run: python tracker.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add states/ || true
          git diff --cached --quiet || git commit -m "Update lotto state [skip ci]"
          git pull --rebase
          git push
